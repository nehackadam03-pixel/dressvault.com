<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | DressVault</title>
    <meta name="description" content="Style inspiration from our community.">
    <link rel="stylesheet" href="style.css">
    <style>
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1rem;
            grid-auto-rows: 250px;
        }

        .gallery-item {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: var(--border-radius);
            transition: var(--transition);
        }

        .gallery-item:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .item-tall {
            grid-row: span 2;
        }

        .item-wide {
            grid-column: span 2;
        }

        @media (max-width: 768px) {
            .item-wide {
                grid-column: span 1;
            }
        }
    </style>
</head>

                Inspiration</h1>
            <p style="color: #6b7785; font-size: 1.15rem; line-height: 1.6;">See how our community styles their
                DressVault finds.</p>
        </div>

        <div class="gallery-grid">
